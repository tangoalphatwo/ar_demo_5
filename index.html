<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SLAM-Lite</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <!-- Three.js is imported as an ES module inside js/renderer.js -->

  <script>
    window.__opencvReady = false;
    window.__opencvSource = 'opencv/opencv.js';
    // Bump this string whenever you upload a new OpenCV build to avoid stale browser caches.
    window.__opencvAssetTag = 'v1';
  
    var Module = {
      locateFile: function (path) {
        // Prefer local assets for the uploaded OpenCV build.
        // (Some builds may not need this if they embed wasm/data.)
        const tag = window.__opencvAssetTag ? `?${encodeURIComponent(window.__opencvAssetTag)}` : '';
        const url = `opencv/${path}${tag}`;
        // Helpful for verifying which wasm/data filenames the build is requesting.
        try { console.log('[OpenCV] locateFile:', path, '->', url); } catch {}
        return url;
      },
      onRuntimeInitialized: function () {
        console.log("OpenCV runtime initialized (Module)");
        window.__opencvReady = true;

        console.log('[OpenCV] asset tag:', window.__opencvAssetTag);

        // Optional sanity check: confirm the wasm artifact is reachable from the server.
        // This doesn't guarantee the runtime used it, but it quickly catches "404 wasm" issues.
        try {
          const wasmUrl = (Module && typeof Module.locateFile === 'function')
            ? Module.locateFile('opencv_js.wasm')
            : 'opencv/opencv_js.wasm';
          fetch(wasmUrl, { method: 'HEAD' })
            .then(r => console.log('[OpenCV] wasm HEAD', { url: wasmUrl, ok: r.ok, status: r.status }))
            .catch(e => console.warn('[OpenCV] wasm HEAD failed:', e));
        } catch (e) {
          console.warn('[OpenCV] wasm HEAD check unavailable:', e);
        }

        // Capability checks for calib3d pose recovery / epipolar geometry.
        // These should exist if the uploaded build includes the right modules.
        const runCapabilityChecks = (cvObj) => {
          try {
            const caps = {
              recoverPose: typeof cvObj?.recoverPose === 'function',
              findEssentialMat: typeof cvObj?.findEssentialMat === 'function',
              findFundamentalMat: typeof cvObj?.findFundamentalMat === 'function'
            };

            console.log('[OpenCV] source:', window.__opencvSource);
            const hasBuildInfo = typeof cvObj?.getBuildInformation === 'function';
            console.log('[OpenCV] build information available:', hasBuildInfo);
            if (hasBuildInfo) {
              const info = String(cvObj.getBuildInformation());
              const snippet = info.split('\n').slice(0, 14).join('\n');
              console.log('[OpenCV] build info (snippet):\n' + snippet);
            }
            console.log('[OpenCV] required APIs:', caps);

            const ok = caps.recoverPose && (caps.findEssentialMat || caps.findFundamentalMat);
            if (ok) {
              console.log('[OpenCV] calib3d pose/epipolar check: PASS');
            } else {
              console.error('[OpenCV] calib3d pose/epipolar check: FAIL');
              if (!caps.recoverPose) console.error('[OpenCV] Missing: cv.recoverPose');
              if (!caps.findEssentialMat) console.warn('[OpenCV] Missing: cv.findEssentialMat');
              if (!caps.findFundamentalMat) console.warn('[OpenCV] Missing: cv.findFundamentalMat');
            }
          } catch (e) {
            console.warn('[OpenCV] capability check failed:', e);
          }
        };

        try {
          const cvMaybe = window.cv;
          if (cvMaybe && typeof cvMaybe.then === 'function') {
            cvMaybe.then(runCapabilityChecks);
          } else {
            runCapabilityChecks(cvMaybe);
          }
        } catch (e) {
          console.warn('[OpenCV] capability check setup failed:', e);
        }
      }
    };
  </script>

  <script>
    // Load OpenCV with a cache-busting tag so updated uploads are actually fetched.
    (function () {
      const tag = window.__opencvAssetTag ? String(window.__opencvAssetTag) : '';
      const suffix = tag ? `?${encodeURIComponent(tag)}` : '';
      const s = document.createElement('script');
      s.src = `opencv/opencv.js${suffix}`;
      // Ensure deterministic execution order relative to other classic scripts.
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
  <script type="module" src="js/main.js"></script>

</head>
<body>
  <!-- Hidden video for camera feed -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Canvas for OpenCV processing -->
  <canvas id="cvCanvas"></canvas>

  <!-- Canvas for Three.js rendering -->
  <canvas id="threeCanvas"></canvas>

  <div id="ui">
    <button id="startBtn">Start AR</button>
    <button id="debugToggle" aria-pressed="false" hidden>Show Debug</button>
    <button id="setWorldZeroBtn" hidden>Set World Zero</button>
    <div id="status">Idle</div>
  </div>

  <div id="toast" hidden aria-hidden="true"></div>

  <div id="debugInfo" aria-hidden="true" hidden></div>
</body>
</html>

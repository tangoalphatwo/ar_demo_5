<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SLAM-Lite</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="style.css" />

  <script>
    // OpenCV loader config
    // - url: where opencv.js is loaded from
    // - requireCalib3d: when true, the app will hard-fail if pose recovery APIs are missing
    window.__OPENCV_CONFIG = window.__OPENCV_CONFIG || {
      url: 'https://docs.opencv.org/4.x/opencv.js',
      requireCalib3d: true
    };

    window.__opencvReady = false;

    // Make wasm/data file location follow the opencv.js URL base.
    // For example: url='libs/opencv.js' -> locateFile('opencv_js.wasm') => 'libs/opencv_js.wasm'
    var Module = {
      locateFile: function (path) {
        try {
          const url = String(window.__OPENCV_CONFIG?.url || '');
          const base = url.slice(0, url.lastIndexOf('/') + 1);
          return base + path;
        } catch {
          return path;
        }
      },
      onRuntimeInitialized: function () {
        console.log('OpenCV runtime initialized (Module)');
        window.__opencvReady = true;
      }
    };
  </script>

  <script>
    // Always load the hosted OpenCV.js build from docs.opencv.org.
    (function () {
      const s = document.createElement('script');
      s.async = true;
      s.src = window.__OPENCV_CONFIG?.url || 'https://docs.opencv.org/4.x/opencv.js';
      document.head.appendChild(s);
    })();
  </script>
  <script type="module" src="js/main.js"></script>

</head>
<body>
  <!-- Hidden video for camera feed -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Canvas for OpenCV processing -->
  <canvas id="cvCanvas"></canvas>

  <!-- Canvas for Three.js rendering (transparent overlay) -->
  <canvas id="threeCanvas"></canvas>

  <div id="ui">
    <button id="startBtn">Start AR</button>
    <div id="status">Idle</div>
  </div>
</body>
</html>
